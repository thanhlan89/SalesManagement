get:
  tags:
    - Users
  summary: List users
  operationId: listUsers
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: search
      in: query
      schema:
        type: string
  responses:
    "200":
      description: Users returned successfully.
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - total
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/index.yaml#/User
              total:
                type: integer
                example: 42
    "401":
      $ref: ../components/responses/errors.yaml#/Unauthorized
post:
  tags:
    - Users
  summary: Create user
  operationId: createUser
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/index.yaml#/CreateUserRequest
  responses:
    "201":
      description: User created successfully.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/index.yaml#/User
    "400":
      $ref: ../components/responses/errors.yaml#/BadRequest
    "401":
      $ref: ../components/responses/errors.yaml#/Unauthorized
    "403":
      $ref: ../components/responses/errors.yaml#/Forbidden
